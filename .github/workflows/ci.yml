name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run test:pbt
      - run: npm run security:audit
      - run: npm run sbom
