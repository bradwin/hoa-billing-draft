services:
  postgres:
    image: postgres:16.4-bookworm
    environment:
      POSTGRES_DB: hoa_billing
      POSTGRES_USER: hoa_app
      POSTGRES_PASSWORD: local_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoa_app -d hoa_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-local:
