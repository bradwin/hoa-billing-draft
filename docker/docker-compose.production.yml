services:
  caddy:
    image: caddy:2.8.4-alpine
    env_file: ./env/production.env.example
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-production:/data
    networks: [edge, app_private, observability_private]
    depends_on:
      - web
      - api

  postgres:
    image: postgres:16.4-bookworm
    env_file: ./env/production.env.example
    volumes:
      - postgres-production:/var/lib/postgresql/data
    networks: [data_private, observability_private]

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    env_file: ./env/production.env.example
    networks: [app_private, data_private, observability_private]
    depends_on:
      - postgres

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    env_file: ./env/production.env.example
    networks: [app_private, observability_private]

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    env_file: ./env/production.env.example
    networks: [data_private, observability_private]
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [observability_private]

  grafana:
    image: grafana/grafana:11.2.0
    networks: [observability_private]

networks:
  edge:
  app_private:
  data_private:
  observability_private:

volumes:
  caddy-production:
  postgres-production:
