services:
  caddy:
    image: caddy:2.8.4-alpine
    env_file: ./env/staging.env.example
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-staging:/data
    depends_on:
      - web
      - api

  postgres:
    image: postgres:16.4-bookworm
    env_file: ./env/staging.env.example
    volumes:
      - postgres-staging:/var/lib/postgresql/data
    networks: [data_private]

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    env_file: ./env/staging.env.example
    networks: [app_private, data_private, observability_private]

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    env_file: ./env/staging.env.example
    networks: [app_private, observability_private]

  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    env_file: ./env/staging.env.example
    networks: [data_private, observability_private]

networks:
  app_private:
  data_private:
  observability_private:

volumes:
  caddy-staging:
  postgres-staging:
